services:
  - type: web
    name: schedule-todo-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schedule-todo-db
          property: connectionString

databases:
  - name: schedule-todo-db
    databaseName: schedule_todo
    plan: free
