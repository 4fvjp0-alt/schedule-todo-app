<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>일정 & 할일 관리</title>
<style>
:root {
  --primary:#4f8ef7; --primary-dark:#2563eb;
  --bg:#f0f4ff; --card:#fff; --text:#1e293b; --text-muted:#64748b;
  --border:#e2e8f0; --success:#22c55e; --danger:#ef4444;
  --radius:12px; --shadow:0 2px 12px rgba(0,0,0,.08);
  --header-bg:#4f8ef7; --input-bg:#fff;
}
body.dark {
  --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; --text-muted:#94a3b8;
  --border:#334155; --header-bg:#1e3a5f; --input-bg:#0f172a;
  --shadow:0 2px 12px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

/* ── Auth ── */
#auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#4f8ef7,#2563eb);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
#auth-screen.hidden{display:none;}
.auth-box{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.auth-logo{text-align:center;font-size:2.5rem;margin-bottom:6px;}
.auth-title{text-align:center;font-size:1.3rem;font-weight:700;margin-bottom:3px;}
.auth-sub{text-align:center;font-size:.82rem;color:#64748b;margin-bottom:22px;}
.auth-tabs{display:flex;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:18px;}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;font-size:.88rem;font-weight:600;color:#64748b;cursor:pointer;transition:all .2s;}
.auth-tab.active{background:#fff;color:#4f8ef7;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.auth-form{display:none;} .auth-form.active{display:block;}
.auth-input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.92rem;outline:none;margin-bottom:10px;transition:border-color .2s;font-family:inherit;}
.auth-input:focus{border-color:#4f8ef7;}
.auth-btn{width:100%;padding:13px;background:#4f8ef7;color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;}
.auth-btn:hover{background:#2563eb;}
.auth-error{color:#ef4444;font-size:.8rem;margin-bottom:8px;min-height:18px;}

/* ── Header ── */
header{background:var(--header-bg);color:#fff;padding:10px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(79,142,247,.3);display:flex;align-items:center;justify-content:space-between;}
.header-left h1{font-size:1.05rem;font-weight:700;}
.header-left p{font-size:.68rem;opacity:.85;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:6px;}
.user-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:.75rem;font-weight:600;}
.icon-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:5px 9px;font-size:.8rem;cursor:pointer;line-height:1;}

/* ── Search bar ── */
.search-bar{padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border);}
.search-input-wrap{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:6px 12px;gap:7px;}
.search-input-wrap input{flex:1;border:none;background:transparent;font-size:.85rem;color:var(--text);outline:none;font-family:inherit;}
.search-input-wrap input::placeholder{color:var(--text-muted);}
.search-clear{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.8rem;padding:0;}

/* ── Tabs ── */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:99;}
.tab-btn{flex:1;padding:11px 4px;border:none;background:transparent;font-size:.82rem;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}

/* ── User filter ── */
.user-filter-bar{display:flex;gap:5px;padding:8px 14px 4px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);}
.user-filter-btn{padding:4px 11px;border:1.5px solid var(--border);background:var(--card);border-radius:20px;font-size:.75rem;font-weight:600;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.user-filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

main{padding:12px;max-width:800px;margin:0 auto;}
.tab-panel{display:none;} .tab-panel.active{display:block;}

/* ── Buttons ── */
.add-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:.9rem;font-weight:600;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:var(--shadow);transition:background .2s;}
.add-btn:hover{background:var(--primary-dark);}
.btn-icon{width:28px;height:28px;border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.78rem;transition:background .15s;}
.btn-edit{background:#f1f5f9;color:#475569;} body.dark .btn-edit{background:#334155;color:#94a3b8;}
.btn-edit:hover{background:#e2e8f0;}
.btn-delete{background:#fef2f2;color:#ef4444;} body.dark .btn-delete{background:#3f1515;color:#ef4444;}
.btn-delete:hover{background:#fee2e2;}

/* ── Card ── */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:8px;border:1px solid var(--border);overflow:hidden;}

/* ── Tags ── */
.tags-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.tag-chip{font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:10px;}

/* ── Owner badge ── */
.owner-badge{display:inline-block;font-size:.65rem;font-weight:700;padding:1px 7px;border-radius:10px;background:#ede9fe;color:#7c3aed;margin-bottom:2px;}
.owner-badge.mine{background:#dbeafe;color:#1d4ed8;}

/* ── Todo ── */
.todo-item{display:flex;align-items:flex-start;padding:12px 13px;gap:10px;}
.todo-check{width:21px;height:21px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.todo-check.done{background:var(--success);border-color:var(--success);color:#fff;}
.todo-check.done::after{content:'✓';font-size:12px;font-weight:bold;}
.todo-check.readonly{cursor:default;}
.todo-content{flex:1;min-width:0;}
.todo-title{font-weight:600;font-size:.9rem;word-break:break-word;}
.todo-title.done{text-decoration:line-through;color:var(--text-muted);}
.todo-desc{font-size:.76rem;color:var(--text-muted);margin-top:2px;word-break:break-word;}
.todo-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center;}
.badge{font-size:.65rem;padding:2px 7px;border-radius:20px;font-weight:600;}
.badge-high{background:#fee2e2;color:#dc2626;} .badge-medium{background:#fef3c7;color:#d97706;} .badge-low{background:#dcfce7;color:#16a34a;}
.due-date{font-size:.7rem;color:var(--text-muted);}
.due-date.overdue{color:var(--danger);font-weight:600;}
.todo-actions{display:flex;gap:4px;flex-shrink:0;}

/* ── Subtask ── */
.subtask-bar{border-top:1px solid var(--border);}
.subtask-toggle{width:100%;padding:7px 13px;background:transparent;border:none;text-align:left;font-size:.75rem;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:5px;}
.subtask-toggle:hover{background:var(--bg);}
.subtask-progress{height:3px;background:var(--border);margin:0 13px 0;}
.subtask-progress-fill{height:100%;background:var(--success);border-radius:3px;transition:width .4s;}
.subtask-section{padding:8px 13px 10px;background:var(--bg);display:none;}
.subtask-section.open{display:block;}
.subtask-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.subtask-item:last-of-type{border-bottom:none;}
.subtask-check{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .2s;}
.subtask-check.done{background:var(--success);border-color:var(--success);color:#fff;}
.subtask-text{flex:1;font-size:.8rem;word-break:break-word;}
.subtask-text.done{text-decoration:line-through;color:var(--text-muted);}
.subtask-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.75rem;opacity:.5;padding:2px 4px;}
.subtask-del:hover{opacity:1;color:var(--danger);}
.subtask-add-row{display:flex;gap:6px;margin-top:8px;}
.subtask-add-input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:.8rem;background:var(--input-bg);color:var(--text);outline:none;font-family:inherit;}
.subtask-add-input:focus{border-color:var(--primary);}
.subtask-add-btn{padding:6px 10px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;}

/* ── Todo sections ── */
.todo-section{margin-bottom:6px;}
.section-header{display:flex;align-items:center;gap:8px;padding:8px 4px;cursor:pointer;user-select:none;}
.section-header:hover{opacity:.8;}
.section-title-text{font-size:.8rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}
.section-count-badge{background:var(--border);color:var(--text-muted);font-size:.68rem;font-weight:700;padding:1px 7px;border-radius:20px;}
.section-chevron{font-size:1rem;color:var(--text-muted);margin-left:auto;transition:transform .2s;}
.section-chevron.collapsed{transform:rotate(-90deg);}
.section-body.collapsed{display:none;}
.section-overdue .section-title-text{color:#ef4444;}
.section-today .section-title-text{color:#f59e0b;}
.section-week .section-title-text{color:var(--primary);}

/* ── Event ── */
.event-item{padding:12px 13px;display:flex;gap:10px;align-items:flex-start;}
.event-color-bar{width:4px;border-radius:4px;flex-shrink:0;min-height:40px;}
.event-content{flex:1;min-width:0;}
.event-title{font-weight:600;font-size:.9rem;word-break:break-word;}
.event-time{font-size:.76rem;color:var(--text-muted);margin-top:2px;}
.event-desc{font-size:.76rem;color:var(--text-muted);margin-top:2px;word-break:break-word;}
.event-actions{display:flex;gap:4px;flex-shrink:0;}
.recurrence-badge{font-size:.63rem;font-weight:700;padding:1px 6px;border-radius:8px;background:#f0fdf4;color:#16a34a;margin-left:4px;}
body.dark .recurrence-badge{background:#14532d;color:#86efac;}

/* ── Comment section ── */
.comment-toggle{width:100%;padding:7px 13px;background:transparent;border:none;border-top:1px solid var(--border);text-align:left;font-size:.75rem;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:5px;}
.comment-toggle:hover{background:var(--bg);}
.comment-section{border-top:1px solid var(--border);padding:10px 13px;background:var(--bg);display:none;}
.comment-section.open{display:block;}
.comment-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.comment-avatar{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.comment-bubble{flex:1;background:var(--card);border-radius:10px;padding:7px 10px;border:1px solid var(--border);}
.comment-meta{font-size:.65rem;color:var(--text-muted);margin-bottom:2px;display:flex;justify-content:space-between;}
.comment-text{font-size:.78rem;word-break:break-word;}
.comment-input-row{display:flex;gap:6px;margin-top:6px;}
.comment-input{flex:1;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:.8rem;background:var(--input-bg);color:var(--text);outline:none;font-family:inherit;}
.comment-input:focus{border-color:var(--primary);}
.comment-send{padding:8px 12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;}

/* ── Filter ── */
.filter-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.filter-btn{padding:5px 12px;border:1px solid var(--border);background:var(--card);border-radius:20px;font-size:.76rem;font-weight:600;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.tag-filter-wrap{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.tag-filter-btn{padding:4px 10px;border:1.5px solid var(--border);background:var(--card);border-radius:20px;font-size:.73rem;font-weight:600;color:var(--text-muted);cursor:pointer;white-space:nowrap;}
.tag-filter-btn.active{border-color:currentColor;}

/* ── Calendar ── */
.calendar-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:6px;}
.calendar-header h2{font-size:1rem;font-weight:700;}
.cal-nav-btn{width:32px;height:32px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:8px;font-size:1rem;cursor:pointer;}
.view-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.view-toggle-btn{padding:5px 11px;border:none;background:transparent;font-size:.75rem;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.view-toggle-btn.active{background:var(--primary);color:#fff;}
.calendar-grid{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg);border-bottom:1px solid var(--border);}
.cal-weekday{text-align:center;padding:6px 2px;font-size:.68rem;font-weight:600;color:var(--text-muted);}
.cal-weekday:first-child{color:#ef4444;} .cal-weekday:last-child{color:#4f8ef7;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day{padding:4px 2px;min-height:52px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day:hover{background:var(--bg);}
.cal-day.today{background:#eff6ff;} body.dark .cal-day.today{background:#1e3a5f;}
.cal-day.selected{background:#dbeafe;} body.dark .cal-day.selected{background:#1e3055;}
.cal-day.other-month .cal-day-num{color:#cbd5e1;}
.cal-day-num{font-size:.75rem;font-weight:600;display:block;text-align:center;padding:2px;margin-bottom:1px;}
.cal-day.today .cal-day-num{background:var(--primary);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;}
.cal-day:first-child .cal-day-num,.cal-day:nth-child(7n+1) .cal-day-num{color:#ef4444;}
.cal-day:nth-child(7n) .cal-day-num{color:#4f8ef7;}
.cal-dot-wrap{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;}
.cal-dot{width:5px;height:5px;border-radius:50%;}
.selected-day-events h3{font-size:.85rem;font-weight:700;color:var(--text-muted);margin-bottom:8px;}
.no-items{text-align:center;padding:36px 20px;color:var(--text-muted);font-size:.86rem;}

/* ── Week view ── */
.week-container{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;}
.week-head{display:grid;grid-template-columns:44px repeat(7,1fr);border-bottom:2px solid var(--border);background:var(--bg);}
.week-head-gutter{border-right:1px solid var(--border);}
.week-head-day{padding:6px 2px;text-align:center;border-right:1px solid var(--border);cursor:pointer;}
.week-head-day:last-child{border-right:none;}
.week-head-day .wd-name{font-size:.68rem;font-weight:600;color:var(--text-muted);}
.week-head-day .wd-num{font-size:.88rem;font-weight:700;margin-top:2px;}
.week-head-day.today .wd-num{background:var(--primary);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;}
.week-head-day.selected{background:#dbeafe;} body.dark .week-head-day.selected{background:#1e3055;}
.week-scroll{max-height:520px;overflow-y:auto;}
.week-body{display:grid;grid-template-columns:44px repeat(7,1fr);}
.week-time-col{border-right:1px solid var(--border);}
.week-time-slot{height:48px;border-bottom:1px dashed var(--border);display:flex;align-items:flex-start;padding:2px 4px 0;font-size:.6rem;color:var(--text-muted);}
.week-day-col{position:relative;border-right:1px solid var(--border);}
.week-day-col:last-child{border-right:none;}
.week-hour-line{height:48px;border-bottom:1px dashed var(--border);}
.week-event{position:absolute;left:2px;right:2px;border-radius:5px;padding:2px 4px;font-size:.66rem;font-weight:600;color:#fff;overflow:hidden;cursor:pointer;z-index:2;line-height:1.3;}
.week-event:hover{filter:brightness(1.1);}
.week-allday-row{display:grid;grid-template-columns:44px repeat(7,1fr);border-bottom:2px solid var(--border);background:var(--bg);}
.week-allday-gutter{border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.58rem;color:var(--text-muted);padding:2px;}
.week-allday-col{border-right:1px solid var(--border);padding:2px 3px;min-height:20px;}
.week-allday-col:last-child{border-right:none;}
.week-allday-item{font-size:.62rem;font-weight:600;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;cursor:pointer;}

/* ── Stats ── */
.stats-user-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;}
.stats-user-tab{padding:6px 14px;border:1.5px solid var(--border);background:var(--card);border-radius:20px;font-size:.78rem;font-weight:600;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.stats-user-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.stat-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-size:2rem;font-weight:800;color:var(--primary);}
.stat-label{font-size:.75rem;color:var(--text-muted);margin-top:2px;}
.section-title{font-size:.88rem;font-weight:700;color:var(--text-muted);margin:16px 0 8px;}
.progress-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;}
.progress-label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:6px;font-weight:600;}
.progress-bar-bg{background:var(--border);border-radius:10px;height:10px;overflow:hidden;}
.progress-bar{height:100%;border-radius:10px;transition:width .6s ease;}
.bar-high{background:#ef4444;} .bar-medium{background:#f59e0b;} .bar-low{background:#22c55e;} .bar-total{background:var(--primary);}
.monthly-chart{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;}
.month-bars{display:flex;gap:6px;align-items:flex-end;height:80px;margin-bottom:6px;}
.month-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.month-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;}
.month-bar.created{background:var(--primary);opacity:.5;}
.month-bar.completed{background:var(--success);}
.month-label{font-size:.62rem;color:var(--text-muted);}
.chart-legend{display:flex;gap:12px;font-size:.7rem;color:var(--text-muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;}
.user-stats-table{width:100%;border-collapse:collapse;font-size:.8rem;}
.user-stats-table th{text-align:left;padding:6px 10px;background:var(--bg);color:var(--text-muted);font-size:.72rem;border-bottom:1px solid var(--border);}
.user-stats-table td{padding:8px 10px;border-bottom:1px solid var(--border);}
.user-stats-table tr:last-child td{border-bottom:none;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);width:100%;max-width:600px;border-radius:20px 20px 0 0;padding:20px 16px 28px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-size:1rem;font-weight:700;}
.modal-close{width:28px;height:28px;border:none;background:#f1f5f9;border-radius:8px;font-size:.95rem;cursor:pointer;color:#64748b;}
body.dark .modal-close{background:#334155;color:#94a3b8;}
.form-group{margin-bottom:12px;}
label{display:block;font-size:.78rem;font-weight:600;color:var(--text-muted);margin-bottom:4px;}
input[type=text],input[type=datetime-local],input[type=date],textarea,select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:.86rem;color:var(--text);background:var(--input-bg);outline:none;transition:border-color .2s;font-family:inherit;}
input:focus,textarea:focus,select:focus{border-color:var(--primary);}
textarea{resize:vertical;min-height:65px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.color-picker-row{display:flex;gap:8px;}
.color-opt{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s;}
.color-opt:hover{transform:scale(1.15);}
.color-opt.selected{border-color:#1e293b;} body.dark .color-opt.selected{border-color:#f1f5f9;}
.btn-submit{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:.92rem;font-weight:700;cursor:pointer;margin-top:6px;transition:background .2s;}
.btn-submit:hover{background:var(--primary-dark);}
.tag-selector{display:flex;flex-wrap:wrap;gap:6px;}
.tag-sel-btn{padding:4px 11px;border:1.5px solid var(--border);background:var(--input-bg);border-radius:20px;font-size:.75rem;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.tag-sel-btn.selected{color:#fff;}

/* ── Subtask modal list ── */
.modal-subtask-list{margin-bottom:6px;}
.modal-subtask-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.modal-subtask-item:last-child{border-bottom:none;}
.modal-subtask-text{flex:1;font-size:.82rem;}

/* ── Activity panel ── */
.activity-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;}
.activity-overlay.open{display:block;}
.activity-panel{position:fixed;top:0;right:0;bottom:0;width:min(360px,100vw);background:var(--card);box-shadow:-4px 0 24px rgba(0,0,0,.15);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;}
.activity-panel.open{transform:translateX(0);}
.activity-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.activity-panel-title{font-size:1rem;font-weight:700;}
.activity-panel-close{width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;font-size:1rem;cursor:pointer;color:var(--text-muted);}
.activity-list{flex:1;overflow-y:auto;padding:8px 0;}
.activity-item{display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.activity-body{flex:1;min-width:0;}
.activity-who{font-size:.8rem;font-weight:700;color:var(--text);}
.activity-action{font-size:.8rem;color:var(--text-muted);font-weight:400;}
.activity-item-title{font-size:.8rem;color:var(--text);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.activity-time{font-size:.68rem;color:var(--text-muted);margin-top:3px;}
.activity-type-icon{font-size:.75rem;margin-right:2px;}
.activity-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:.86rem;}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);padding:10px 22px;border-radius:24px;font-size:.85rem;font-weight:600;color:#fff;opacity:0;transition:opacity .25s,transform .25s;z-index:9999;pointer-events:none;max-width:88vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-success{background:#22c55e;}
.toast-error{background:#ef4444;}
.toast-info{background:#4f8ef7;}

@media(max-width:480px){.form-row{grid-template-columns:1fr;}.cal-day{min-height:42px;}.stats-grid{grid-template-columns:repeat(2,1fr);}.week-head-day .wd-name{font-size:.6rem;}}
</style>
</head>
<body>

<!-- Activity panel -->
<div class="activity-overlay" id="activity-overlay" onclick="closeActivityPanel()"></div>
<div class="activity-panel" id="activity-panel">
  <div class="activity-panel-header">
    <span class="activity-panel-title">📋 변경사항</span>
    <button class="activity-panel-close" onclick="closeActivityPanel()">✕</button>
  </div>
  <div class="activity-list" id="activity-list">
    <div class="activity-empty">불러오는 중...</div>
  </div>
</div>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">📅</div>
    <div class="auth-title">일정 & 할일 관리</div>
    <div class="auth-sub">로그인하고 일정을 관리하세요</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">로그인</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">회원가입</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div id="form-login" class="auth-form active">
      <input class="auth-input" type="text" id="login-username" placeholder="아이디" autocomplete="username">
      <input class="auth-input" type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password">
      <button class="auth-btn" onclick="doLogin()">로그인</button>
    </div>
    <div id="form-register" class="auth-form">
      <input class="auth-input" type="text" id="reg-username" placeholder="아이디 (2자 이상)" autocomplete="username">
      <input class="auth-input" type="password" id="reg-password" placeholder="비밀번호 (4자 이상)" autocomplete="new-password">
      <button class="auth-btn" onclick="doRegister()">회원가입</button>
    </div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <h1>📅 일정 & 할일</h1>
    <p id="today-str"></p>
  </div>
  <div class="header-right">
    <span class="user-badge" id="header-username"></span>
    <button class="icon-btn" onclick="openActivityPanel()" title="변경사항">📋 변경사항</button>
    <button class="icon-btn" id="dark-toggle" onclick="toggleDark()" title="다크모드">🌙</button>
    <button class="icon-btn" onclick="openPwModal()" title="비밀번호 변경">🔑</button>
    <button class="icon-btn" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('todos',this)">✅ 할일</button>
  <button class="tab-btn" onclick="switchTab('calendar',this)">📅 일정</button>
  <button class="tab-btn" onclick="switchTab('stats',this)">📊 통계</button>
</div>

<div class="search-bar">
  <div class="search-input-wrap">
    <span style="color:var(--text-muted);font-size:.85rem">🔍</span>
    <input type="text" id="search-input" placeholder="할일 / 일정 검색..." oninput="onSearchInput(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none">✕</button>
  </div>
</div>

<div class="user-filter-bar" id="user-filter-bar">
  <button class="user-filter-btn active" onclick="setUserFilter('all',this)">전체</button>
</div>

<main>
  <!-- TODOS -->
  <div id="tab-todos" class="tab-panel active">
    <button class="add-btn" onclick="openTodoModal()">＋ 할일 추가</button>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active',this)">진행중</button>
      <button class="filter-btn" onclick="setFilter('done',this)">완료</button>
      <button class="filter-btn" onclick="setFilter('high',this)">🔴 높음</button>
      <button class="filter-btn" onclick="setFilter('medium',this)">🟡 보통</button>
      <button class="filter-btn" onclick="setFilter('low',this)">🟢 낮음</button>
    </div>
    <div class="tag-filter-wrap" id="tag-filter-bar"></div>
    <div id="todo-list"></div>
  </div>

  <!-- CALENDAR -->
  <div id="tab-calendar" class="tab-panel">
    <button class="add-btn" onclick="openEventModal()">＋ 일정 추가</button>
    <div class="calendar-header">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <h2 id="cal-title"></h2>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="view-toggle">
          <button class="view-toggle-btn active" id="vt-month" onclick="setCalView('month')">월</button>
          <button class="view-toggle-btn" id="vt-week" onclick="setCalView('week')">주</button>
        </div>
        <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      </div>
    </div>
    <!-- Month view -->
    <div id="cal-month-view">
      <div class="calendar-grid">
        <div class="cal-weekdays">
          <div class="cal-weekday">일</div><div class="cal-weekday">월</div>
          <div class="cal-weekday">화</div><div class="cal-weekday">수</div>
          <div class="cal-weekday">목</div><div class="cal-weekday">금</div>
          <div class="cal-weekday">토</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
      </div>
      <div class="selected-day-events">
        <h3 id="selected-day-title">날짜를 선택하세요</h3>
        <div id="selected-events"></div>
      </div>
    </div>
    <!-- Week view -->
    <div id="cal-week-view" style="display:none;">
      <div class="week-container">
        <div class="week-head" id="week-head"></div>
        <div class="week-allday-row" id="week-allday"></div>
        <div class="week-scroll">
          <div class="week-body" id="week-body"></div>
        </div>
      </div>
      <div class="selected-day-events" id="week-selected-events-wrap" style="display:none;">
        <h3 id="week-selected-day-title"></h3>
        <div id="week-selected-events"></div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div id="tab-stats" class="tab-panel">
    <div id="stats-content"></div>
  </div>
</main>

<!-- TODO MODAL -->
<div class="modal-overlay" id="todo-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="todo-modal-title">할일 추가</span>
      <button class="modal-close" onclick="closeTodoModal()">✕</button>
    </div>
    <div class="form-group"><label>제목 *</label><input type="text" id="todo-title" placeholder="할일을 입력하세요"></div>
    <div class="form-group"><label>설명</label><textarea id="todo-desc" placeholder="상세 내용 (선택)"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>우선순위</label>
        <select id="todo-priority"><option value="high">🔴 높음</option><option value="medium" selected>🟡 보통</option><option value="low">🟢 낮음</option></select>
      </div>
      <div class="form-group"><label>마감일</label><input type="date" id="todo-due"></div>
    </div>
    <div class="form-group"><label>태그</label><div class="tag-selector" id="todo-tag-selector"></div></div>
    <div class="form-group" id="subtask-modal-section" style="display:none;">
      <label>서브태스크</label>
      <div class="modal-subtask-list" id="modal-subtask-list"></div>
      <div class="subtask-add-row">
        <input class="subtask-add-input" id="modal-subtask-input" placeholder="서브태스크 추가..." onkeydown="if(event.key==='Enter'){event.preventDefault();addModalSubtask();}">
        <button class="subtask-add-btn" onclick="addModalSubtask()">+</button>
      </div>
    </div>
    <button class="btn-submit" onclick="saveTodo()">저장</button>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🔑 비밀번호 변경</span>
      <button class="modal-close" onclick="closePwModal()">✕</button>
    </div>
    <div id="pw-error" style="color:#ef4444;font-size:.8rem;margin-bottom:8px;min-height:18px;"></div>
    <div class="form-group"><label>현재 비밀번호</label><input type="password" id="pw-current" placeholder="현재 비밀번호"></div>
    <div class="form-group"><label>새 비밀번호</label><input type="password" id="pw-new" placeholder="새 비밀번호 (4자 이상)"></div>
    <div class="form-group"><label>새 비밀번호 확인</label><input type="password" id="pw-confirm" placeholder="새 비밀번호 다시 입력"></div>
    <button class="btn-submit" onclick="changePassword()">변경하기</button>
  </div>
</div>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="event-modal-title">일정 추가</span>
      <button class="modal-close" onclick="closeEventModal()">✕</button>
    </div>
    <div class="form-group"><label>제목 *</label><input type="text" id="event-title" placeholder="일정 제목을 입력하세요"></div>
    <div class="form-group"><label>설명</label><textarea id="event-desc" placeholder="상세 내용 (선택)"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>시작</label><input type="datetime-local" id="event-start"></div>
      <div class="form-group"><label>종료</label><input type="datetime-local" id="event-end"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>반복</label>
        <select id="event-recurrence">
          <option value="none">반복 없음</option>
          <option value="weekly">매주</option>
          <option value="monthly">매월</option>
        </select>
      </div>
      <div class="form-group"><label>색상</label>
        <div class="color-picker-row" style="margin-top:6px;">
          <div class="color-opt selected" style="background:#4f8ef7" data-color="#4f8ef7" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#22c55e" data-color="#22c55e" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#f59e0b" data-color="#f59e0b" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#ef4444" data-color="#ef4444" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#a855f7" data-color="#a855f7" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#ec4899" data-color="#ec4899" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#14b8a6" data-color="#14b8a6" onclick="selectColor(this)"></div>
        </div>
      </div>
    </div>
    <div class="form-group"><label>태그</label><div class="tag-selector" id="event-tag-selector"></div></div>
    <button class="btn-submit" onclick="saveEvent()">저장</button>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const TAGS = [
  {name:'업무',color:'#3b82f6'},{name:'개인',color:'#22c55e'},
  {name:'공부',color:'#f59e0b'},{name:'건강',color:'#ef4444'},
  {name:'취미',color:'#a855f7'},{name:'기타',color:'#94a3b8'},
];
function tagColor(name){return TAGS.find(t=>t.name===name)?.color||'#94a3b8';}
const WEEK_START_HOUR=6, WEEK_END_HOUR=23, HOUR_H=48;

// ── State ──────────────────────────────────────────────────────────────────
let todos=[], events=[], currentUser=null;
let todoFilter='all', userFilter='all', tagFilter=null, searchQuery='', statsUserFilter='all';
let editingTodoId=null, editingEventId=null;
let selectedColor='#4f8ef7', selectedTodoTags=new Set(), selectedEventTags=new Set();
let calYear, calMonth, selectedDay=null, calView='month';
let calWeekOffset=0; // weeks from current week
let commentCache={}, openComments=new Set();
let subtaskCache={}, openSubtasks=new Set();
let modalSubtasks=[], modalSubtaskIdCounter=0; // for buffering new subtasks in modal

const now=new Date();
calYear=now.getFullYear(); calMonth=now.getMonth();

document.getElementById('today-str').textContent=
  now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

// ── Activity panel ────────────────────────────────────────────────────────
const ACTION_ICONS = {
  '할일 추가':'➕','할일 수정':'✏️','할일 삭제':'🗑️','할일 완료':'✅','할일 완료 취소':'↩️',
  '일정 추가':'📅','일정 수정':'✏️','일정 삭제':'🗑️',
  '댓글 작성':'💬','서브태스크 추가':'📋',
};
const TYPE_LABEL = {todo:'할일', event:'일정', comment:'댓글', subtask:'서브태스크'};

async function openActivityPanel(){
  document.getElementById('activity-overlay').classList.add('open');
  document.getElementById('activity-panel').classList.add('open');
  await loadActivity();
}
function closeActivityPanel(){
  document.getElementById('activity-overlay').classList.remove('open');
  document.getElementById('activity-panel').classList.remove('open');
}
async function loadActivity(){
  const el=document.getElementById('activity-list');
  el.innerHTML='<div class="activity-empty">불러오는 중...</div>';
  const r=await fetch('/api/activity');
  const items=await r.json();
  if(!items.length){el.innerHTML='<div class="activity-empty">변경사항이 없습니다</div>';return;}
  el.innerHTML=items.map(item=>{
    const icon=ACTION_ICONS[item.action]||'🔔';
    const avatar=(item.username||'?')[0].toUpperCase();
    const timeStr=relTime(item.created_at);
    return `<div class="activity-item">
      <div class="activity-avatar">${avatar}</div>
      <div class="activity-body">
        <div><span class="activity-who">${esc(item.username||'알 수 없음')}</span> <span class="activity-action">${icon} ${esc(item.action)}</span></div>
        ${item.item_title?`<div class="activity-item-title">"${esc(item.item_title)}"</div>`:''}
        <div class="activity-time">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
}
function relTime(dtStr){
  if(!dtStr)return '';
  const d=new Date(dtStr);const diff=(Date.now()-d.getTime())/1000;
  if(isNaN(diff)||diff<0)return dtStr.slice(5,16);
  if(diff<60)return '방금 전';
  if(diff<3600)return `${Math.floor(diff/60)}분 전`;
  if(diff<86400)return `${Math.floor(diff/3600)}시간 전`;
  if(diff<86400*30)return `${Math.floor(diff/86400)}일 전`;
  return dtStr.slice(0,10);
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),280);},2800);
}

// ── Dark mode ──────────────────────────────────────────────────────────────
function initDark(){
  if(localStorage.getItem('dark')==='1'){document.body.classList.add('dark');document.getElementById('dark-toggle').textContent='☀️';}
}
function toggleDark(){
  const on=document.body.classList.toggle('dark');
  document.getElementById('dark-toggle').textContent=on?'☀️':'🌙';
  localStorage.setItem('dark',on?'1':'0');
}
initDark();

// ── Auth ───────────────────────────────────────────────────────────────────
function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('form-login').classList.toggle('active',tab==='login');
  document.getElementById('form-register').classList.toggle('active',tab==='register');
  document.getElementById('auth-error').textContent='';
}
async function doLogin(){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:document.getElementById('login-username').value.trim(),
    password:document.getElementById('login-password').value})});
  const d=await r.json();
  if(!r.ok){document.getElementById('auth-error').textContent=d.error;return;}
  currentUser=d;onLoggedIn();
}
async function doRegister(){
  const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:document.getElementById('reg-username').value.trim(),
    password:document.getElementById('reg-password').value})});
  const d=await r.json();
  if(!r.ok){document.getElementById('auth-error').textContent=d.error;return;}
  currentUser=d;onLoggedIn();
}
async function doLogout(){await fetch('/api/logout',{method:'POST'});currentUser=null;document.getElementById('auth-screen').classList.remove('hidden');}
function onLoggedIn(){
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('header-username').textContent='👤 '+currentUser.username;
  loadAll();
}
async function checkSession(){const r=await fetch('/api/me');const d=await r.json();if(d){currentUser=d;onLoggedIn();}}

// ── Data ───────────────────────────────────────────────────────────────────
async function loadAll(){await Promise.all([loadTodos(),loadEvents()]);await loadUserFilter();}
async function loadTodos(){const r=await fetch('/api/todos');todos=await r.json();renderTodos();renderTagFilter();renderStats();}
async function loadEvents(){const r=await fetch('/api/events');events=await r.json();renderCalendar();if(selectedDay)renderSelectedDay();renderStats();}
async function loadUserFilter(){
  const r=await fetch('/api/users');const users=await r.json();
  const bar=document.getElementById('user-filter-bar');
  bar.innerHTML=`<button class="user-filter-btn${userFilter==='all'?' active':''}" onclick="setUserFilter('all',this)">전체</button>`
    +users.map(u=>`<button class="user-filter-btn${userFilter==u.id?' active':''}" onclick="setUserFilter(${u.id},this)">👤 ${esc(u.username)}</button>`).join('');
}

// ── Search ─────────────────────────────────────────────────────────────────
function onSearchInput(val){
  searchQuery=val.trim().toLowerCase();
  document.getElementById('search-clear').style.display=searchQuery?'':'none';
  renderTodos();
  if(calView==='month')renderCalendar();else renderWeekView();
}
function clearSearch(){
  document.getElementById('search-input').value='';
  onSearchInput('');
}

// ── Filters ────────────────────────────────────────────────────────────────
function setFilter(f,btn){todoFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTodos();}
function setUserFilter(uid,btn){userFilter=uid;document.querySelectorAll('.user-filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTodos();renderCalendar();if(selectedDay)renderSelectedDay();}
function setTagFilter(tag,btn){
  tagFilter=(tagFilter===tag?null:tag);
  document.querySelectorAll('.tag-filter-btn').forEach(b=>b.classList.remove('active'));
  if(tagFilter)btn.classList.add('active');renderTodos();
}
function renderTagFilter(){
  const used=new Set();todos.forEach(t=>(t.tags||'').split(',').forEach(t=>t&&used.add(t)));
  const bar=document.getElementById('tag-filter-bar');
  if(!used.size){bar.innerHTML='';return;}
  bar.innerHTML=[...used].map(name=>{
    const col=tagColor(name);
    return `<button class="tag-filter-btn${tagFilter===name?' active':''}" style="border-color:${col};color:${col}" onclick="setTagFilter('${name}',this)">${name}</button>`;
  }).join('');
}
function isOwn(item){return currentUser&&item.user_id===currentUser.id;}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(tab,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='stats')renderStats();
}

// ── Tags helpers ───────────────────────────────────────────────────────────
function tagsHtml(tagsStr){
  if(!tagsStr)return '';
  return `<div class="tags-wrap">${tagsStr.split(',').filter(Boolean).map(name=>`<span class="tag-chip" style="background:${tagColor(name)}22;color:${tagColor(name)}">${name}</span>`).join('')}</div>`;
}
function renderTagSelector(containerId,selectedSet){
  document.getElementById(containerId).innerHTML=TAGS.map(t=>
    `<button type="button" class="tag-sel-btn${selectedSet.has(t.name)?' selected':''}"
      style="${selectedSet.has(t.name)?`background:${t.color};border-color:${t.color}`:`border-color:${t.color};color:${t.color}`}"
      onclick="toggleTagSel('${containerId}','${t.name}')">${t.name}</button>`
  ).join('');
}
function toggleTagSel(containerId,name){
  const set=containerId.includes('todo')?selectedTodoTags:selectedEventTags;
  set.has(name)?set.delete(name):set.add(name);renderTagSelector(containerId,set);
}

// ── Todos ──────────────────────────────────────────────────────────────────
function renderTodos(){
  let list=todos;
  if(userFilter!=='all')list=list.filter(t=>t.user_id==userFilter);
  if(todoFilter==='active')list=list.filter(t=>!t.completed);
  else if(todoFilter==='done')list=list.filter(t=>t.completed);
  else if(['high','medium','low'].includes(todoFilter))list=list.filter(t=>t.priority===todoFilter);
  if(tagFilter)list=list.filter(t=>(t.tags||'').split(',').includes(tagFilter));
  if(searchQuery)list=list.filter(t=>t.title.toLowerCase().includes(searchQuery)||(t.description||'').toLowerCase().includes(searchQuery));
  const el=document.getElementById('todo-list');
  if(!list.length){el.innerHTML='<div class="no-items">할일이 없습니다 🎉</div>';return;}

  if(['high','medium','low','done'].includes(todoFilter)){
    el.innerHTML=list.map(t=>todoCard(t)).join('');return;
  }

  const todayStr=toDateStr(now);
  const weekEndStr=toDateStr(new Date(now.getFullYear(),now.getMonth(),now.getDate()+7));
  const active=list.filter(t=>!t.completed);
  const done=list.filter(t=>t.completed);
  const overdue=active.filter(t=>t.due_date&&t.due_date<todayStr);
  const todayItems=active.filter(t=>t.due_date===todayStr);
  const thisWeek=active.filter(t=>t.due_date&&t.due_date>todayStr&&t.due_date<=weekEndStr);
  const later=active.filter(t=>!t.due_date||t.due_date>weekEndStr);

  let html='';
  if(overdue.length)html+=todoSectionHtml('🚨 기한 초과','section-overdue',overdue,false);
  if(todayItems.length)html+=todoSectionHtml('📌 오늘 마감','section-today',todayItems,false);
  if(thisWeek.length)html+=todoSectionHtml('📅 이번 주','section-week',thisWeek,false);
  if(later.length)html+=todoSectionHtml('📋 나중에','',later,false);
  if(done.length)html+=todoSectionHtml(`✅ 완료 (${done.length})`,'',done,true);
  if(!html)html='<div class="no-items">할일이 없습니다 🎉</div>';
  el.innerHTML=html;
}

function todoSectionHtml(title,cls,items,collapsed){
  const id='sec_'+Math.random().toString(36).slice(2,8);
  return `<div class="todo-section ${cls}">
    <div class="section-header" onclick="toggleSection('${id}')">
      <span class="section-title-text">${title}</span>
      <span class="section-count-badge">${items.length}</span>
      <span class="section-chevron${collapsed?' collapsed':''}" id="chv-${id}">⌄</span>
    </div>
    <div class="section-body${collapsed?' collapsed':''}" id="${id}">
      ${items.map(t=>todoCard(t)).join('')}
    </div>
  </div>`;
}
function toggleSection(id){
  const body=document.getElementById(id),chv=document.getElementById('chv-'+id);
  if(!body||!chv)return;
  body.classList.toggle('collapsed');chv.classList.toggle('collapsed');
}

function todoCard(t){
  const own=isOwn(t);const key=`todo_${t.id}`;
  const isOpen=openComments.has(key);const cached=commentCache[key];
  const stOpen=openSubtasks.has(t.id);const stCached=subtaskCache[t.id];
  const stCount=t.subtask_count||0;const stDone=t.subtask_done||0;
  const stPct=stCount?Math.round(stDone/stCount*100):0;
  return `<div class="card" id="card-${key}">
    <div class="todo-item">
      <div class="todo-check ${t.completed?'done':''} ${own?'':'readonly'}" ${own?`onclick="toggleTodo(${t.id})"`:''}></div>
      <div class="todo-content">
        ${t.username?`<span class="owner-badge${own?' mine':''}">${own?'나':esc(t.username)}</span>`:''}
        <div class="todo-title ${t.completed?'done':''}">${highlight(esc(t.title),searchQuery)}</div>
        ${t.description?`<div class="todo-desc">${highlight(esc(t.description),searchQuery)}</div>`:''}
        <div class="todo-meta">
          <span class="badge badge-${t.priority}">${t.priority==='high'?'🔴 높음':t.priority==='medium'?'🟡 보통':'🟢 낮음'}</span>
          ${t.due_date?`<span class="due-date ${isOverdue(t)?'overdue':''}">📅 ${formatDate(t.due_date)}${isOverdue(t)?' (기한초과)':''}</span>`:''}
        </div>
        ${tagsHtml(t.tags)}
      </div>
      ${own?`<div class="todo-actions">
        <button class="btn-icon btn-edit" onclick="editTodo(${t.id})">✏️</button>
        <button class="btn-icon btn-delete" onclick="deleteTodo(${t.id})">🗑️</button>
      </div>`:''}
    </div>
    ${stCount>0?`<div class="subtask-bar">
      <div class="subtask-progress" style="margin-bottom:0"><div class="subtask-progress-fill" style="width:${stPct}%"></div></div></div>`:''}
    ${(stCount>0||own)?`<div class="subtask-bar">
      <button class="subtask-toggle" onclick="toggleSubtasks(${t.id})">
        📋 서브태스크 ${stCount>0?`${stDone}/${stCount}`:'추가'}
      </button>
      <div class="subtask-section${stOpen?' open':''}" id="ss-${t.id}">
        ${stOpen&&stCached?renderSubtasksHtml(stCached,t.id,own):'<div style="font-size:.75rem;color:var(--text-muted)">로딩 중...</div>'}
      </div>
    </div>`:''}
    <button class="comment-toggle" onclick="toggleComments('${key}')">
      💬 댓글 ${t.comment_count>0?`<strong>${t.comment_count}개</strong>`:'달기'}
    </button>
    <div class="comment-section${isOpen?' open':''}" id="cs-${key}">
      ${isOpen&&cached?renderCommentsHtml(cached,key):'<div style="font-size:.75rem;color:var(--text-muted);padding:4px 0">로딩 중...</div>'}
    </div>
  </div>`;
}

function highlight(text,q){
  if(!q)return text;
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re,'<mark style="background:#fef08a;color:#1e293b;border-radius:3px">$1</mark>');
}

function isOverdue(t){return !t.completed&&t.due_date&&t.due_date<new Date().toISOString().split('T')[0];}
function formatDate(d){if(!d)return '';const[y,m,day]=d.split('-');return `${y}.${m}.${day}`;}

async function toggleTodo(id){
  const t=todos.find(x=>x.id===id);if(!t||!isOwn(t))return;
  const nowDone=!t.completed;
  await fetch(`/api/todos/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({...t,completed:nowDone?1:0})});
  showToast(nowDone?`✅ "${t.title}" 완료!`:`↩️ "${t.title}" 다시 진행중`,'info');
  await loadTodos();if(selectedDay)renderSelectedDay();
}
async function deleteTodo(id){
  if(!confirm('삭제하시겠습니까?'))return;
  await fetch(`/api/todos/${id}`,{method:'DELETE'});
  delete commentCache[`todo_${id}`];delete subtaskCache[id];openSubtasks.delete(id);
  showToast('🗑️ 할일이 삭제되었습니다','error');
  await loadTodos();if(selectedDay)renderSelectedDay();
}
function openTodoModal(t=null){
  editingTodoId=t?t.id:null;
  document.getElementById('todo-modal-title').textContent=t?'할일 수정':'할일 추가';
  document.getElementById('todo-title').value=t?t.title:'';
  document.getElementById('todo-desc').value=t?t.description:'';
  document.getElementById('todo-priority').value=t?t.priority:'medium';
  document.getElementById('todo-due').value=t?t.due_date:'';
  selectedTodoTags=new Set((t?.tags||'').split(',').filter(Boolean));
  renderTagSelector('todo-tag-selector',selectedTodoTags);
  // Subtask section only when editing
  const stSection=document.getElementById('subtask-modal-section');
  modalSubtasks=[];
  if(t){
    stSection.style.display='';
    loadModalSubtasks(t.id);
  }else{
    stSection.style.display='none';
    document.getElementById('modal-subtask-list').innerHTML='';
  }
  document.getElementById('todo-modal').classList.add('open');
  setTimeout(()=>document.getElementById('todo-title').focus(),300);
}
async function loadModalSubtasks(todoId){
  const r=await fetch(`/api/subtasks?todo_id=${todoId}`);
  const items=await r.json();
  subtaskCache[todoId]=items;
  renderModalSubtaskList(items,todoId);
}
function renderModalSubtaskList(items,todoId){
  const el=document.getElementById('modal-subtask-list');
  if(!items.length){el.innerHTML='<div style="font-size:.8rem;color:var(--text-muted);padding:4px 0">서브태스크 없음</div>';return;}
  el.innerHTML=items.map(s=>`<div class="modal-subtask-item">
    <div class="subtask-check${s.completed?' done':''}" onclick="toggleModalSubtask(${todoId},${s.id},${s.completed?0:1})">${s.completed?'✓':''}</div>
    <span class="modal-subtask-text${s.completed?' done':''}">${esc(s.title)}</span>
    <button class="subtask-del" onclick="deleteModalSubtask(${todoId},${s.id})">✕</button>
  </div>`).join('');
}
async function toggleModalSubtask(todoId,stId,val){
  await fetch(`/api/subtasks/${stId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({completed:val})});
  await loadModalSubtasks(todoId);
}
async function deleteModalSubtask(todoId,stId){
  await fetch(`/api/subtasks/${stId}`,{method:'DELETE'});
  await loadModalSubtasks(todoId);
}
async function addModalSubtask(){
  const input=document.getElementById('modal-subtask-input');
  const title=(input.value||'').trim();if(!title||!editingTodoId)return;
  await fetch('/api/subtasks',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({todo_id:editingTodoId,title})});
  input.value='';
  await loadModalSubtasks(editingTodoId);
}
function closeTodoModal(){document.getElementById('todo-modal').classList.remove('open');}
function editTodo(id){const t=todos.find(x=>x.id===id);if(t&&isOwn(t))openTodoModal(t);}
async function saveTodo(){
  const title=document.getElementById('todo-title').value.trim();
  if(!title){alert('제목을 입력하세요');return;}
  const data={title,description:document.getElementById('todo-desc').value.trim(),
    priority:document.getElementById('todo-priority').value,
    due_date:document.getElementById('todo-due').value,
    tags:[...selectedTodoTags].join(','),
    completed:editingTodoId?(todos.find(t=>t.id===editingTodoId)?.completed||0):0};
  const isEdit=!!editingTodoId;
  if(isEdit){
    await fetch(`/api/todos/${editingTodoId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  }else{
    await fetch('/api/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  }
  closeTodoModal();
  showToast(isEdit?`✏️ "${title}" 수정됨`:`➕ "${title}" 추가됨`,'success');
  await loadTodos();if(selectedDay)renderSelectedDay();
}

// ── Subtasks (card view) ───────────────────────────────────────────────────
async function toggleSubtasks(todoId){
  const el=document.getElementById(`ss-${todoId}`);if(!el)return;
  const wasOpen=openSubtasks.has(todoId);
  if(wasOpen){openSubtasks.delete(todoId);el.classList.remove('open');}
  else{
    openSubtasks.add(todoId);el.classList.add('open');
    if(!subtaskCache[todoId])await fetchSubtasks(todoId);
    const t=todos.find(x=>x.id===todoId);
    // Re-query after async in case DOM was re-rendered during fetch
    const el2=document.getElementById(`ss-${todoId}`);
    if(el2){el2.classList.add('open');el2.innerHTML=renderSubtasksHtml(subtaskCache[todoId]||[],todoId,isOwn(t));}
  }
}
async function fetchSubtasks(todoId){
  const r=await fetch(`/api/subtasks?todo_id=${todoId}`);
  subtaskCache[todoId]=await r.json();
}
function renderSubtasksHtml(items,todoId,own){
  const list=items.map(s=>`<div class="subtask-item">
    <div class="subtask-check${s.completed?' done':''}" ${own?`onclick="toggleSubtask(${todoId},${s.id},${s.completed?0:1})"`:''} style="${own?'':'cursor:default'}">${s.completed?'✓':''}</div>
    <span class="subtask-text${s.completed?' done':''}">${esc(s.title)}</span>
    ${own?`<button class="subtask-del" onclick="deleteSubtask(${todoId},${s.id})">✕</button>`:''}
  </div>`).join('');
  const addRow=own?`<div class="subtask-add-row">
    <input class="subtask-add-input" id="sti-${todoId}" placeholder="서브태스크 추가..." onkeydown="if(event.key==='Enter'){event.preventDefault();addSubtask(${todoId});}">
    <button class="subtask-add-btn" onclick="addSubtask(${todoId})">+</button>
  </div>`:'';
  return `${list}${addRow}`;
}
async function toggleSubtask(todoId,stId,val){
  await fetch(`/api/subtasks/${stId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({completed:val})});
  await fetchSubtasks(todoId);
  const t=todos.find(x=>x.id===todoId);
  const items=subtaskCache[todoId];
  document.getElementById(`ss-${todoId}`).innerHTML=renderSubtasksHtml(items,todoId,isOwn(t));
  // update counts in state
  if(t){t.subtask_done=items.filter(s=>s.completed).length;}
  // update progress bar
  const stCount=items.length,stDone=items.filter(s=>s.completed).length;
  const fill=document.querySelector(`#card-todo_${todoId} .subtask-progress-fill`);
  if(fill)fill.style.width=(stCount?Math.round(stDone/stCount*100):0)+'%';
  const btn=document.querySelector(`#card-todo_${todoId} .subtask-toggle`);
  if(btn)btn.innerHTML=`📋 서브태스크 ${stDone}/${stCount}`;
}
async function deleteSubtask(todoId,stId){
  await fetch(`/api/subtasks/${stId}`,{method:'DELETE'});
  await fetchSubtasks(todoId);
  const t=todos.find(x=>x.id===todoId);
  document.getElementById(`ss-${todoId}`).innerHTML=renderSubtasksHtml(subtaskCache[todoId],todoId,isOwn(t));
}
async function addSubtask(todoId){
  const input=document.getElementById(`sti-${todoId}`);
  const title=(input?.value||'').trim();if(!title)return;
  await fetch('/api/subtasks',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({todo_id:todoId,title})});
  input.value='';
  await fetchSubtasks(todoId);
  const t=todos.find(x=>x.id===todoId);
  const items=subtaskCache[todoId];
  document.getElementById(`ss-${todoId}`).innerHTML=renderSubtasksHtml(items,todoId,isOwn(t));
  if(t){t.subtask_count=items.length;t.subtask_done=items.filter(s=>s.completed).length;}
  showToast('📋 서브태스크 추가됨','info');
}

// ── Comments ───────────────────────────────────────────────────────────────
async function toggleComments(key){
  const el=document.getElementById(`cs-${key}`);if(!el)return;
  const wasOpen=openComments.has(key);
  if(wasOpen){openComments.delete(key);el.classList.remove('open');}
  else{
    openComments.add(key);el.classList.add('open');
    if(!commentCache[key])await fetchComments(key);
    // Re-query after async in case renderTodos() ran during the fetch
    const el2=document.getElementById(`cs-${key}`);
    if(el2){el2.classList.add('open');el2.innerHTML=renderCommentsHtml(commentCache[key]||[],key);}
  }
}
async function fetchComments(key){
  const[type,id]=key.split('_');
  const r=await fetch(`/api/comments?type=${type}&id=${id}`);
  commentCache[key]=await r.json();
}
function renderCommentsHtml(comments,key){
  const list=comments.map(c=>{
    const own=currentUser&&c.user_id===currentUser.id;
    return `<div class="comment-item">
      <div class="comment-avatar">${esc((c.username||'?')[0].toUpperCase())}</div>
      <div class="comment-bubble">
        <div class="comment-meta">
          <span>${esc(c.username||'알 수 없음')}</span>
          <span>${c.created_at?c.created_at.slice(5,16):''} ${own?`<button onclick="deleteComment('${key}',${c.id})" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:.7rem">✕</button>`:''}</span>
        </div>
        <div class="comment-text">${esc(c.content)}</div>
      </div>
    </div>`;
  }).join('');
  return `${list}<div class="comment-input-row">
    <input class="comment-input" id="ci-${key}" placeholder="댓글을 입력하세요..." onkeydown="if(event.key==='Enter')sendComment('${key}')">
    <button class="comment-send" onclick="sendComment('${key}')">전송</button>
  </div>`;
}
async function sendComment(key){
  const input=document.getElementById(`ci-${key}`);
  const content=(input?.value||'').trim();if(!content)return;
  const[type,id]=key.split('_');
  await fetch('/api/comments',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({item_type:type,item_id:parseInt(id),content})});
  input.value='';
  await fetchComments(key);
  document.getElementById(`cs-${key}`).innerHTML=renderCommentsHtml(commentCache[key],key);
  if(type==='todo'){const t=todos.find(x=>x.id==id);if(t)t.comment_count=(commentCache[key]||[]).length;}
  else{const e=events.find(x=>x.id==id);if(e)e.comment_count=(commentCache[key]||[]).length;}
  const btn=document.querySelector(`#card-${key} .comment-toggle`);
  if(btn){const cnt=(commentCache[key]||[]).length;btn.innerHTML=`💬 댓글 ${cnt>0?`<strong>${cnt}개</strong>`:'달기'}`;}
  showToast('💬 댓글이 등록되었습니다','info');
}
async function deleteComment(key,cid){
  await fetch(`/api/comments/${cid}`,{method:'DELETE'});
  await fetchComments(key);
  document.getElementById(`cs-${key}`).innerHTML=renderCommentsHtml(commentCache[key],key);
}

// ── Recurrence helpers ─────────────────────────────────────────────────────
function getOccurrences(event,viewStart,viewEnd){
  const rec=event.recurrence||'none';
  if(rec==='none')return [event];
  const occ=[];const base=new Date(event.start_datetime);
  const baseEnd=event.end_datetime?new Date(event.end_datetime):null;
  const dur=baseEnd?baseEnd-base:0;
  let cur=new Date(base);let limit=200;
  while(cur<=viewEnd&&limit-->0){
    if(cur>=viewStart){
      const ns=fmtDT(cur);const ne=baseEnd?fmtDT(new Date(cur.getTime()+dur)):'';
      occ.push({...event,start_datetime:ns,end_datetime:ne,_virtual:true});
    }
    if(rec==='weekly')cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+7,cur.getHours(),cur.getMinutes());
    else if(rec==='monthly')cur=new Date(cur.getFullYear(),cur.getMonth()+1,cur.getDate(),cur.getHours(),cur.getMinutes());
    else break;
  }
  return occ;
}
function fmtDT(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}T${p2(d.getHours())}:${p2(d.getMinutes())}:00`;}
function p2(n){return String(n).padStart(2,'0');}

function visibleEvents(viewStart,viewEnd,filterUser){
  const fe=filterUser==='all'?events:events.filter(e=>e.user_id==filterUser);
  const all=[];
  fe.forEach(e=>getOccurrences(e,viewStart,viewEnd).forEach(o=>all.push(o)));
  return all;
}

// ── Calendar nav ───────────────────────────────────────────────────────────
function calNav(dir){
  if(calView==='month'){
    calMonth+=dir;
    if(calMonth>11){calMonth=0;calYear++;}
    if(calMonth<0){calMonth=11;calYear--;}
    renderCalendar();
  }else{
    calWeekOffset+=dir;
    renderWeekView();
  }
}
function setCalView(v){
  calView=v;
  document.getElementById('vt-month').classList.toggle('active',v==='month');
  document.getElementById('vt-week').classList.toggle('active',v==='week');
  document.getElementById('cal-month-view').style.display=v==='month'?'':'none';
  document.getElementById('cal-week-view').style.display=v==='week'?'':'none';
  if(v==='month')renderCalendar();else renderWeekView();
}

// ── Month view ─────────────────────────────────────────────────────────────
function renderCalendar(){
  if(calView!=='month')return;
  document.getElementById('cal-title').textContent=`${calYear}년 ${calMonth+1}월`;
  const first=new Date(calYear,calMonth,1),last=new Date(calYear,calMonth+1,0);
  const startDay=first.getDay(),todayStr=toDateStr(now);
  const vStart=new Date(calYear,calMonth,1),vEnd=new Date(calYear,calMonth+1,0,23,59);
  const evts=visibleEvents(vStart,vEnd,userFilter);
  let ft=userFilter==='all'?todos:todos.filter(t=>t.user_id==userFilter);
  if(searchQuery){
    evts.splice(0,evts.length,...evts.filter(e=>e.title.toLowerCase().includes(searchQuery)));
    ft=ft.filter(t=>t.title.toLowerCase().includes(searchQuery));
  }
  const map={};
  evts.forEach(e=>{const d=e.start_datetime.split('T')[0];if(!map[d])map[d]=[];map[d].push({type:'event',data:e});});
  ft.forEach(t=>{if(!t.due_date)return;if(!map[t.due_date])map[t.due_date]=[];map[t.due_date].push({type:'todo',data:t});});
  let html='',dc=1;
  const prev=new Date(calYear,calMonth,0).getDate();
  for(let i=0;i<42;i++){
    if(i<startDay){html+=`<div class="cal-day other-month"><span class="cal-day-num">${prev-startDay+i+1}</span></div>`;}
    else if(dc>last.getDate()){html+=`<div class="cal-day other-month"><span class="cal-day-num">${dc++-last.getDate()}</span></div>`;}
    else{
      const ds=`${calYear}-${p2(calMonth+1)}-${p2(dc)}`;
      const items=map[ds]||[];
      const dots=items.slice(0,4).map(item=>item.type==='event'?`<div class="cal-dot" style="background:${item.data.color}"></div>`:`<div class="cal-dot" style="background:#94a3b8"></div>`).join('');
      html+=`<div class="cal-day${ds===todayStr?' today':''}${ds===selectedDay?' selected':''}" onclick="selectCalDay('${ds}')"><span class="cal-day-num">${dc}</span><div class="cal-dot-wrap">${dots}</div></div>`;
      dc++;
    }
  }
  document.getElementById('cal-days').innerHTML=html;
}
function selectCalDay(ds){selectedDay=ds;renderCalendar();renderSelectedDay();}
function renderSelectedDay(){
  if(!selectedDay)return;
  const[y,m,d]=selectedDay.split('-');
  document.getElementById('selected-day-title').textContent=`${y}년 ${m}월 ${d}일`;
  const vS=new Date(selectedDay+'T00:00:00'),vE=new Date(selectedDay+'T23:59:59');
  let de=visibleEvents(vS,vE,userFilter).filter(e=>e.start_datetime.startsWith(selectedDay));
  let dt=todos.filter(t=>t.due_date===selectedDay);
  if(userFilter!=='all')dt=dt.filter(t=>t.user_id==userFilter);
  const el=document.getElementById('selected-events');
  if(!de.length&&!dt.length){el.innerHTML='<div class="no-items" style="padding:20px">이 날의 일정/할일이 없습니다</div>';return;}
  el.innerHTML=de.map(e=>eventCard(e)).join('')+dt.map(t=>todoCard(t)).join('');
}

// ── Week view ──────────────────────────────────────────────────────────────
function getWeekDates(){
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const dayOfWeek=base.getDay(); // 0=Sun
  const monday=new Date(base.getFullYear(),base.getMonth(),base.getDate()-dayOfWeek+1+calWeekOffset*7);
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday.getFullYear(),monday.getMonth(),monday.getDate()+i);
    days.push(d);
  }
  return days;
}
function renderWeekView(){
  const days=getWeekDates();
  const todayStr=toDateStr(now);
  const vStart=days[0],vEnd=new Date(days[6].getFullYear(),days[6].getMonth(),days[6].getDate(),23,59);
  const DAY_NAMES=['일','월','화','수','목','금','토'];
  // Update title
  document.getElementById('cal-title').textContent=
    `${days[0].getFullYear()}년 ${days[0].getMonth()+1}월 ${days[0].getDate()}일 ~ ${days[6].getMonth()+1}월 ${days[6].getDate()}일`;

  const evts=visibleEvents(vStart,vEnd,userFilter);
  if(searchQuery)evts.splice(0,evts.length,...evts.filter(e=>e.title.toLowerCase().includes(searchQuery)));

  // Header
  const headGutter='<div class="week-head-gutter"></div>';
  const headDays=days.map((d,i)=>{
    const ds=toDateStr(d);
    const isToday=ds===todayStr;
    const isSel=ds===selectedDay;
    return `<div class="week-head-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectWeekDay('${ds}')">
      <div class="wd-name" style="${i===0?'color:#ef4444':i===6?'color:#4f8ef7':''}">${DAY_NAMES[d.getDay()]}</div>
      <div class="wd-num">${d.getDate()}</div>
    </div>`;
  }).join('');
  document.getElementById('week-head').innerHTML=headGutter+headDays;

  // All-day row (todos with due dates in this week)
  let ft=userFilter==='all'?todos:todos.filter(t=>t.user_id==userFilter);
  const allDayGutter='<div class="week-allday-gutter">종일</div>';
  const allDayCols=days.map(d=>{
    const ds=toDateStr(d);
    const dayTodos=ft.filter(t=>t.due_date===ds);
    const items=dayTodos.map(t=>`<div class="week-allday-item" style="background:#94a3b8" title="${esc(t.title)}" onclick="selectWeekDay('${ds}')">${esc(t.title)}</div>`).join('');
    return `<div class="week-allday-col">${items}</div>`;
  }).join('');
  document.getElementById('week-allday').innerHTML=allDayGutter+allDayCols;

  // Time grid
  const timeCol=Array.from({length:WEEK_END_HOUR-WEEK_START_HOUR+1},(_,i)=>{
    const h=WEEK_START_HOUR+i;
    return `<div class="week-time-slot">${h}:00</div>`;
  }).join('');

  // Group events by day
  const byDay={};
  days.forEach(d=>{byDay[toDateStr(d)]=[];});
  evts.forEach(e=>{
    const ds=e.start_datetime.split('T')[0];
    if(byDay[ds])byDay[ds].push(e);
  });

  const dayCols=days.map(d=>{
    const ds=toDateStr(d);
    const dayEvts=byDay[ds]||[];
    const lines=Array.from({length:WEEK_END_HOUR-WEEK_START_HOUR+1},()=>'<div class="week-hour-line"></div>').join('');
    const blocks=dayEvts.map(e=>{
      const [,tPart]=e.start_datetime.split('T');
      const [sh,sm]=(tPart||'09:00').split(':').map(Number);
      const top=Math.max(0,(sh-WEEK_START_HOUR)*HOUR_H+sm*(HOUR_H/60));
      let height=HOUR_H;
      if(e.end_datetime){
        const [,ePart]=e.end_datetime.split('T');
        const [eh,em]=(ePart||'10:00').split(':').map(Number);
        height=Math.max(20,(eh*60+em-(sh*60+sm))*(HOUR_H/60));
      }
      const rec=e.recurrence&&e.recurrence!=='none';
      return `<div class="week-event" style="top:${top}px;height:${height}px;background:${e.color}"
        title="${esc(e.title)}${rec?' (반복)':''}"
        onclick="selectWeekDay('${ds}')">${esc(e.title)}${rec?'🔁':''}</div>`;
    }).join('');
    return `<div class="week-day-col">${lines}${blocks}</div>`;
  }).join('');

  document.getElementById('week-body').innerHTML=
    `<div class="week-time-col">${timeCol}</div>${dayCols}`;
}

function selectWeekDay(ds){
  selectedDay=ds;
  renderWeekView();
  // Show day detail
  const[y,m,d]=ds.split('-');
  const wrap=document.getElementById('week-selected-events-wrap');
  document.getElementById('week-selected-day-title').textContent=`${y}년 ${m}월 ${d}일`;
  const vS=new Date(ds+'T00:00:00'),vE=new Date(ds+'T23:59:59');
  let de=visibleEvents(vS,vE,userFilter).filter(e=>e.start_datetime.startsWith(ds));
  let dt=todos.filter(t=>t.due_date===ds);
  if(userFilter!=='all')dt=dt.filter(t=>t.user_id==userFilter);
  const el=document.getElementById('week-selected-events');
  if(!de.length&&!dt.length){
    el.innerHTML='<div class="no-items" style="padding:20px">이 날의 일정/할일이 없습니다</div>';
  }else{
    el.innerHTML=de.map(e=>eventCard(e)).join('')+dt.map(t=>todoCard(t)).join('');
  }
  wrap.style.display='';
}

// ── Events CRUD ────────────────────────────────────────────────────────────
function eventCard(e){
  const own=isOwn(e);const key=`event_${e.id}`;const isOpen=openComments.has(key);
  const rec=e.recurrence&&e.recurrence!=='none';
  return `<div class="card" id="card-${key}">
    <div class="event-item">
      <div class="event-color-bar" style="background:${e.color}"></div>
      <div class="event-content">
        ${e.username?`<span class="owner-badge${own?' mine':''}">${own?'나':esc(e.username)}</span>`:''}
        <div class="event-title">${esc(e.title)}${rec?`<span class="recurrence-badge">🔁 ${e.recurrence==='weekly'?'매주':'매월'}</span>`:''}</div>
        <div class="event-time">${formatDatetime(e.start_datetime)}${e.end_datetime?' → '+formatDatetime(e.end_datetime):''}</div>
        ${e.description?`<div class="event-desc">${esc(e.description)}</div>`:''}
        ${tagsHtml(e.tags)}
      </div>
      ${own&&!e._virtual?`<div class="event-actions">
        <button class="btn-icon btn-edit" onclick="editEvent(${e.id})">✏️</button>
        <button class="btn-icon btn-delete" onclick="deleteEvent(${e.id})">🗑️</button>
      </div>`:''}
    </div>
    <button class="comment-toggle" onclick="toggleComments('${key}')">💬 댓글 ${e.comment_count>0?`<strong>${e.comment_count}개</strong>`:'달기'}</button>
    <div class="comment-section${isOpen?' open':''}" id="cs-${key}">
      ${isOpen&&commentCache[key]?renderCommentsHtml(commentCache[key],key):''}
    </div>
  </div>`;
}

function openEventModal(e=null){
  editingEventId=e?e.id:null;
  document.getElementById('event-modal-title').textContent=e?'일정 수정':'일정 추가';
  document.getElementById('event-title').value=e?e.title:'';
  document.getElementById('event-desc').value=e?e.description:'';
  const def=selectedDay?`${selectedDay}T09:00`:new Date().toISOString().slice(0,16);
  document.getElementById('event-start').value=e?e.start_datetime.slice(0,16):def;
  document.getElementById('event-end').value=e&&e.end_datetime?e.end_datetime.slice(0,16):'';
  document.getElementById('event-recurrence').value=e?e.recurrence||'none':'none';
  selectedColor=e?e.color:'#4f8ef7';
  document.querySelectorAll('.color-opt').forEach(el=>el.classList.toggle('selected',el.dataset.color===selectedColor));
  selectedEventTags=new Set((e?.tags||'').split(',').filter(Boolean));
  renderTagSelector('event-tag-selector',selectedEventTags);
  document.getElementById('event-modal').classList.add('open');
  setTimeout(()=>document.getElementById('event-title').focus(),300);
}
function closeEventModal(){document.getElementById('event-modal').classList.remove('open');}
function editEvent(id){const e=events.find(x=>x.id===id);if(e&&isOwn(e))openEventModal(e);}
async function deleteEvent(id){
  if(!confirm('삭제하시겠습니까?'))return;
  await fetch(`/api/events/${id}`,{method:'DELETE'});delete commentCache[`event_${id}`];
  showToast('🗑️ 일정이 삭제되었습니다','error');
  await loadEvents();
}
function selectColor(el){document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selectedColor=el.dataset.color;}
async function saveEvent(){
  const title=document.getElementById('event-title').value.trim();
  if(!title){alert('제목을 입력하세요');return;}
  const start=document.getElementById('event-start').value;
  if(!start){alert('시작 시간을 입력하세요');return;}
  const data={title,description:document.getElementById('event-desc').value.trim(),
    start_datetime:start,end_datetime:document.getElementById('event-end').value||'',
    color:selectedColor,tags:[...selectedEventTags].join(','),
    recurrence:document.getElementById('event-recurrence').value};
  const isEdit=!!editingEventId;
  if(isEdit){
    await fetch(`/api/events/${editingEventId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  }else{
    await fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  }
  closeEventModal();
  showToast(isEdit?`✏️ "${title}" 수정됨`:`📅 "${title}" 추가됨`,'success');
  await loadEvents();
}

// ── Stats ──────────────────────────────────────────────────────────────────
function setStatsUser(uid){statsUserFilter=uid;renderStats();}
function renderStats(){
  const el=document.getElementById('stats-content');
  if(!el||!document.getElementById('tab-stats').classList.contains('active'))return;
  const uMap={};
  todos.forEach(t=>{if(t.user_id&&t.username&&!uMap[t.user_id])uMap[t.user_id]=t.username;});
  events.forEach(e=>{if(e.user_id&&e.username&&!uMap[e.user_id])uMap[e.user_id]=e.username;});
  const userList=Object.entries(uMap);
  const tabsHtml=`<div class="stats-user-tabs">
    <button class="stats-user-tab${statsUserFilter==='all'?' active':''}" onclick="setStatsUser('all')">📊 전체</button>
    ${userList.map(([id,name])=>`<button class="stats-user-tab${statsUserFilter==id?' active':''}" onclick="setStatsUser(${id})">👤 ${esc(name)}</button>`).join('')}
  </div>`;
  const ft=statsUserFilter==='all'?todos:todos.filter(t=>t.user_id==statsUserFilter);
  const fe=statsUserFilter==='all'?events:events.filter(e=>e.user_id==statsUserFilter);
  const total=ft.length,completed=ft.filter(t=>t.completed).length;
  const pending=total-completed,rate=total?Math.round(completed/total*100):0;
  const thisMonth=new Date().toISOString().slice(0,7);
  const eventsThisMonth=fe.filter(e=>e.start_datetime.startsWith(thisMonth)).length;
  const pGroups={high:ft.filter(t=>t.priority==='high'),medium:ft.filter(t=>t.priority==='medium'),low:ft.filter(t=>t.priority==='low')};
  const pBar=(items,cls)=>{const r=items.length?Math.round(items.filter(t=>t.completed).length/items.length*100):0;
    return `<div class="progress-wrap">
      <div class="progress-label"><span>${cls==='bar-high'?'🔴 높음':cls==='bar-medium'?'🟡 보통':'🟢 낮음'} (${items.length}개)</span><span>${r}%</span></div>
      <div class="progress-bar-bg"><div class="progress-bar ${cls}" style="width:${r}%"></div></div>
    </div>`;
  };
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(`${d.getFullYear()}-${p2(d.getMonth()+1)}`);}
  const maxCount=Math.max(1,...months.map(m=>ft.filter(t=>t.created_at&&t.created_at.startsWith(m)).length));
  const monthBars=months.map(m=>{
    const created=ft.filter(t=>t.created_at&&t.created_at.startsWith(m)).length;
    const done=ft.filter(t=>t.created_at&&t.created_at.startsWith(m)&&t.completed).length;
    const h=Math.round(created/maxCount*70);const dh=created?Math.round(done/created*h):0;
    return `<div class="month-bar-wrap">
      <div style="position:relative;height:70px;width:100%;display:flex;align-items:flex-end;gap:2px">
        <div class="month-bar created" style="height:${h}px;flex:1" title="${created}개 추가"></div>
        <div class="month-bar completed" style="height:${dh}px;flex:1" title="${done}개 완료"></div>
      </div>
      <div class="month-label">${m.slice(5)}월</div>
    </div>`;
  }).join('');
  let userTableHtml='';
  if(statsUserFilter==='all'){
    const uStat={};
    todos.forEach(t=>{const k=t.username||'(미지정)';if(!uStat[k])uStat[k]={total:0,done:0};uStat[k].total++;if(t.completed)uStat[k].done++;});
    const rows=Object.entries(uStat).map(([name,s])=>
      `<tr><td>${esc(name)}</td><td>${s.total}</td><td>${s.done}</td><td>${s.total?Math.round(s.done/s.total*100):0}%</td></tr>`).join('');
    if(rows)userTableHtml=`<div class="section-title">사용자별 현황</div>
    <div class="card" style="overflow:hidden"><table class="user-stats-table">
      <thead><tr><th>사용자</th><th>전체</th><th>완료</th><th>완료율</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }
  el.innerHTML=`${tabsHtml}
    ${statsUserFilter!=='all'?`<div style="font-size:.82rem;color:var(--text-muted);margin-bottom:10px;font-weight:600">👤 ${esc(uMap[statsUserFilter]||'')} 의 통계</div>`:''}
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">전체 할일</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#22c55e">${completed}</div><div class="stat-label">완료</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#f59e0b">${pending}</div><div class="stat-label">진행중</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#a855f7">${eventsThisMonth}</div><div class="stat-label">이번달 일정</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>전체 완료율</span><span style="color:var(--primary);font-size:1.1rem;font-weight:800">${rate}%</span></div>
      <div class="progress-bar-bg"><div class="progress-bar bar-total" style="width:${rate}%"></div></div>
    </div>
    <div class="section-title">우선순위별 완료율</div>
    ${pBar(pGroups.high,'bar-high')}${pBar(pGroups.medium,'bar-medium')}${pBar(pGroups.low,'bar-low')}
    <div class="section-title">월별 할일 현황</div>
    <div class="monthly-chart">
      <div class="month-bars">${monthBars}</div>
      <div class="chart-legend">
        <span><span class="legend-dot" style="background:#4f8ef7;opacity:.5"></span>추가</span>
        <span><span class="legend-dot" style="background:#22c55e"></span>완료</span>
      </div>
    </div>
    ${userTableHtml}`;
}

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toDateStr(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function formatDatetime(dt){if(!dt)return '';return new Date(dt).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('reg-password').addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
document.getElementById('todo-title').addEventListener('keydown',e=>{if(e.key==='Enter')saveTodo();});

// ── Password change ────────────────────────────────────────────────────────
function openPwModal(){
  ['pw-current','pw-new','pw-confirm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pw-error').textContent='';
  document.getElementById('pw-modal').classList.add('open');
  setTimeout(()=>document.getElementById('pw-current').focus(),300);
}
function closePwModal(){document.getElementById('pw-modal').classList.remove('open');}
async function changePassword(){
  const current=document.getElementById('pw-current').value;
  const newPw=document.getElementById('pw-new').value;
  const confirm=document.getElementById('pw-confirm').value;
  const errEl=document.getElementById('pw-error');
  if(newPw!==confirm){errEl.textContent='새 비밀번호가 일치하지 않습니다';return;}
  const r=await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({current_password:current,new_password:newPw})});
  const d=await r.json();
  if(!r.ok){errEl.textContent=d.error;return;}
  closePwModal();showToast('🔑 비밀번호가 변경되었습니다','success');
}
document.getElementById('pw-confirm').addEventListener('keydown',e=>{if(e.key==='Enter')changePassword();});

checkSession();
